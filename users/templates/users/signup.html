{% extends "Brand/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
      <div class="col-lg-8 col-md-9 col-sm-12"></div>

            <div class="card shadow-sm p-4">
                <h3 class="mb-4 text-center">Register your account</h3>

                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-dark"
                            onmouseover="this.classList.replace('btn-dark','btn-success')"
                            onmouseout="this.classList.replace('btn-success','btn-dark')">
                            Sign up
                        </button>
                    </div>
                </form>

                <p class="mt-3 text-center">
                    Already have an account?
                    <a href="{% url 'login' %}">Log in</a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
