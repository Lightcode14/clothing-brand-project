{% extends "Brand/base.html" %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg p-5 text-center" style="max-width: 500px; border-radius: 15px;">
        
        <div class="mb-4">
            <i class="bi bi-x-circle-fill text-danger" style="font-size: 60px;"></i>
        </div>

        <h2 class="text-danger fw-bold">Payment Failed ❌</h2>
        <p class="text-muted mt-3">
            Something went wrong with your payment. Please try again.
        </p>

        <div class="mt-4">
            <a href="javascript:history.back()" class="btn btn-outline-danger px-4 me-2">
                Try Again
            </a>

            <a href="{% url 'brand-home' %}" class="btn btn-secondary px-4">
                Go Home
            </a>
        </div>

    </div>
</div>

{% endblock %}
